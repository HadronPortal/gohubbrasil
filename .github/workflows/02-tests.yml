name: 🧪 Agente de Testes

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint + Testes unitários + E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: 🔎 Lint (ESLint)
        run: npm run lint

      - name: 🧪 Testes unitários (Vitest)
        run: npm run test

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium

      - name: 🎭 Testes end-to-end (Playwright)
        run: npx playwright test
        env:
          CI: true

      - name: 📎 Subir relatório do Playwright (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: ✅ Testes OK
        if: success()
        run: echo "Todos os testes passaram. Liberado para deploy."
