<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoHub Brasil</title>
    <meta name="description" content="Agende servicos de beleza, bem-estar e cuidados perto de voce." />
    <meta name="author" content="GoHub Brasil" />
    <meta name="theme-color" content="#3157D5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GoHub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="/manifest.webmanifest?v=20260625-3" />
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/gohub-icon-180.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="GoHub Brasil" />
    <meta property="og:description" content="Agende servicos de beleza, bem-estar e cuidados perto de voce." />
    <meta property="og:image" content="/icons/gohub-icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@gohubbrasil" />
    <meta name="twitter:title" content="GoHub Brasil" />
    <meta name="twitter:description" content="Agende servicos de beleza, bem-estar e cuidados perto de voce." />
    <meta name="twitter:image" content="/icons/gohub-icon-512.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
      }

      #gohub-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #ffffff;
      }

      #gohub-boot-loader img {
        display: block;
        width: min(240px, 68vw);
        height: auto;
        border: 0;
        outline: 0;
        box-shadow: none;
        background: transparent;
        animation: gohub-boot-pulse 1.45s ease-in-out infinite;
      }

      #gohub-boot-loader .dots {
        display: flex;
        gap: 6px;
      }

      #gohub-boot-loader .dots span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #3157d5;
        animation: gohub-dot 1s ease-in-out infinite;
      }

      #gohub-boot-loader .dots span:nth-child(2) {
        animation-delay: 160ms;
      }

      #gohub-boot-loader .dots span:nth-child(3) {
        animation-delay: 320ms;
      }

      @keyframes gohub-boot-pulse {
        0%,
        100% {
          opacity: 0.78;
          transform: scale(0.985);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes gohub-dot {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-4px);
        }
      }
    </style>
  </head>

  <body>
    <div id="gohub-boot-loader" role="status" aria-label="Carregando GoHub">
      <img src="/logo-gohub-loading.png" alt="GoHub" />
      <div class="dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
